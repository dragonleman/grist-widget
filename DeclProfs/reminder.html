<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Activities Declaration</title>

    <link rel="stylesheet" href="https://web2018.epfl.ch/8.3.0/css/elements.min.css">
    <script src="https://web2018.epfl.ch/8.3.0/js/elements.min.js"></script>

    <style>

        body {
            background: #f7f8fa;
        }

        .page-container {
            max-width: 1500px;
            margin: auto;
        }

        .toolbar-card,
        .stats-card,
        .table-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

		.filter-pills {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.filter-pill {
			border: 1px solid #ddd;
			background: #fff;
			padding: 6px 14px;
			border-radius: 999px;
			cursor: pointer;
			font-size: 14px;
			display: flex;
			gap: 6px;
			align-items: center;
			transition: all .15s ease;
		}

		.filter-pill span {
			font-weight: 600;
		}

		.filter-pill:hover {
			background: #f5f5f5;
		}

		.filter-pill.active {
			background: #111;
			color: #fff;
			border-color: #111;
		}

		.d-none {
			display: none;
		}

        .filters-row {
            gap: 12px;
        }

        .table thead th {
            white-space: nowrap;
        }

        .table tbody tr:hover {
            background-color: #fafafa;
        }

        #searchInput {
            padding-left: 34px !important;
            height: 40px;
        }
    </style>
</head>

<body>

<header class="header header-light my-2">
    <div class="header-light-content">
        <a class="logo" href="https://www.epfl.ch">
            <img src="img/epfl_small.png" alt="Logo EPFL" class="img-fluid">
        </a>
        <p class="site-title">
            <a href="#">Professor outside activities</a>
        </p>
		<nav class="nav-lang nav-lang-short ml-auto pr-lg-5"></nav>
    </div>
</header>

<div class="page-container p-4">
	
    <!-- TOOLBAR -->
    <div class="toolbar-card mb-4">

        <div class="d-flex justify-content-between align-items-start flex-wrap">

            <div>

                <div id="searchDiv"
                     class="mb-3"
                     style="width: 320px; position: relative; display: none;">

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Search someone..."
                    >

                    <svg class="icon"
                         aria-hidden="true"
                         style="position: absolute;
                                left: 10px;
                                top: 50%;
                                transform: translateY(-50%);
                                width: 16px;
                                height: 16px;
                                pointer-events: none;">
                        <use xlink:href="#user"></use>
                    </svg>
                </div>

                <!-- <div class="d-flex filters-row align-items-center">
                    <div style="width: 140px;">
                        <select id="yearFilter" class="form-control"></select>
                    </div>
                </div> -->

				<div style="width: 140px;">
					<input type="text"
						id="yearInput"
						class="form-control"
						placeholder="YYYY"
						inputmode="numeric"
						maxlength="4">
				</div>
            </div>

            <div id="sendDiv" style="display: none;">
                <button id="sendReminderBtn" class="btn btn-primary">
                    Send reminder
                </button>
            </div>

        </div>

    </div>

	<!-- FILTERS / STATS -->
	<div id="statsDiv" class="filter-pills d-none mb-4">

		<button class="filter-pill active" data-filter="all">
			All <span id="totalAll">0</span>
		</button>

		<button class="filter-pill" data-filter="submitted">
			Submitted <span id="totalSubmitted">0</span>
		</button>

		<button class="filter-pill" data-filter="wrong">
			Wrong <span id="totalWrong">0</span>
		</button>

		<button class="filter-pill" data-filter="missing">
			Missing <span id="totalMissings">0</span>
		</button>

	</div>

    <!-- TABLE -->
    <div class="table-card">

        <div class="table-responsive">

            <table id="table_alt" class="table table-boxed mb-0">

                <thead>
                    <tr>
                        <th id="reminderCheckbox" style="display: none">
                            <input type="checkbox" id="selectAll">
                        </th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Sciper</th>
                        <th>Unit</th>
                        <th>Status</th>
                        <th>Sent reminder at</th>
                        <th>Updated at</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

</div>


<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
	const selectAll = document.getElementById('selectAll');
	//const yearInput = document.getElementById("yearInput");

	let allRecords = [];
	let selectedYear = new Date().getFullYear().toString();
	let selectedFilter = "all";
	let isAdmin = false;

	window.grist.ready({ requiredAccess: 'full' });

	function parseStatusByYear(str) {
		try {
			return JSON.parse(str || "{}");
		} catch (e) {
			console.error("Invalid StatusByYear JSON:", str);
			return {};
		}
	}

	function renderTable(records) {

		const tbody = document.querySelector('#table_alt tbody');
		tbody.innerHTML = '';

		if (!records || records.length === 0) {

			const row = tbody.insertRow();
			const cell = row.insertCell();

			cell.colSpan = 8;
			cell.textContent = 'No data found.';
			cell.style.textAlign = 'center';

			return;
		}

		let totalAll = 0;			// number of users
		let totalSubmitted = 0;		// number of users have submitted activity (valid, wrong, drafts)
		let totalValid = 0;			// number of users have valid activities 
		let totalMissing = 0;		// number of users that have not yet submitted activities

		for (const rec of records) {

			const statusMap = parseStatusByYear(rec.StatusByYear);

			// Ignore empty records of selected year
			if (selectedYear && !(selectedYear in statusMap)) {
				continue;
			}

			// Status
			let status;

			if (selectedYear) {
				status = (statusMap[selectedYear].totalActivities === statusMap[selectedYear].totalValid) && (statusMap[selectedYear].totalActivities > 0) ? "✅" : "❌";

				totalAll++;

				if (statusMap[selectedYear].totalActivities === 0) {
					totalMissing++;
				} else {
					totalSubmitted++
					if (status === "✅") {
						totalValid++;
					} 
				}

			} else {
				status = "";
			}

			const row = tbody.insertRow();

			// SelectReminder
			if (isAdmin) {
				const checkboxCell = row.insertCell();
				const checkboxInput = document.createElement('input');
				checkboxInput.type = 'checkbox';
				checkboxInput.classList.add('row-checkbox');
				checkboxInput.checked = !!rec.SelectReminder;
				checkboxInput.addEventListener('change', async () => {
					if (checkboxInput.checked !== rec.SelectReminder) {
						await window.grist.selectedTable.update({
							id: rec.id,
							fields: { SelectReminder: checkboxInput.checked }
						});
					}
				});
				checkboxCell.appendChild(checkboxInput);
			}

			// Name
			row.insertCell().textContent = rec.Name || '';

			// Username
			row.insertCell().textContent = rec.Username || '';

			// Email
			row.insertCell().textContent = rec.Email || '';

			// Sciper
			row.insertCell().textContent = rec.UserId || '';

			// Unit
			row.insertCell().textContent = rec.Unit || '';

			// Status
			row.insertCell().textContent = status;

			// Sent Reminder At
			row.insertCell().textContent = rec.SentReminderAt ? new Date(rec.SentReminderAt).toLocaleString('fr-CH', { hour12: false }) : '';

			// Updated At
			row.insertCell().textContent = rec.UpdatedAt ? new Date(rec.UpdatedAt).toLocaleString('fr-CH', { hour12: false }) : '';
		}

		document.getElementById("totalAll").textContent = totalAll;
		document.getElementById("totalSubmitted").textContent = totalSubmitted;
		document.getElementById("totalWrong").textContent = totalSubmitted - totalValid;
		document.getElementById("totalMissings").textContent = totalMissing;
	}


	function getFiltered() {
		const searchValue = document.getElementById('searchInput').value.toLowerCase();

		return allRecords.filter(rec => {

			const matchesSearch =
				(rec.Name || '').toLowerCase().includes(searchValue);

			const statusMap = parseStatusByYear(rec.StatusByYear);

			if (selectedYear && !(selectedYear in statusMap)) {
				return false;
			}

			const yearData = statusMap[selectedYear];

			if (!yearData) return false;

			const isSubmitted = yearData.totalActivities > 0;
			const isWell = yearData.totalActivities > 0 &&
						yearData.totalActivities === yearData.totalValid;
			const isWrong = isSubmitted && !isWell;
			const isMissing = yearData.totalActivities === 0;

			let matchesFilter = true;

			switch (selectedFilter) {

				case "submitted":
					matchesFilter = isSubmitted;
					break;

				case "wrong":
					matchesFilter = isWrong;
					break;

				case "missing":
					matchesFilter = isMissing;
					break;

				case "all":
				default:
					matchesFilter = true;
			}

			return matchesSearch && matchesFilter;
		});
	}

	function applyFilter(filter) {
		selectedFilter = filter;
		applyFilters();
	}

	function applyFilters() {
		renderTable(getFiltered());
	}

	window.grist.onRecords((records) => {
		allRecords = records || [];

		const years = new Set();

		for (const rec of allRecords) {
			const statusMap = parseStatusByYear(rec.StatusByYear);
			Object.keys(statusMap || {}).forEach(year => {
				years.add(year);
			});
		}

		const currentYear = new Date().getFullYear().toString();
		years.add(currentYear);

		const sortedYears = [...years].sort();

		if (!sortedYears.includes(selectedYear)) {
			selectedYear = currentYear;
		}

		//yearInput.value = selectedYear;

		if (allRecords.length > 1) {
			document.getElementById('searchDiv').style.display = 'block';
			document.getElementById('sendDiv').style.display = 'block';
			document.getElementById('statsDiv').classList.remove('d-none');
			document.getElementById('reminderCheckbox').style.display = 'table-cell';
			isAdmin = true;
		}

		applyFilters();
	});

	// Filter all
	document.querySelectorAll('.filter-pill').forEach(btn => {

		btn.addEventListener('click', () => {

			document.querySelectorAll('.filter-pill')
				.forEach(b => b.classList.remove('active'));

			btn.classList.add('active');

			applyFilter(btn.dataset.filter);
		});

	});

	// Search filter
	document
		.getElementById('searchInput')
		.addEventListener('input', applyFilters);

	// Status filter
	document
		.getElementById('statusFilter')
		.addEventListener('change', applyFilters);

	// Select all
	selectAll.addEventListener('change', async () => {
		const checked = selectAll.checked;

		// Update visuel immédiat
		document.querySelectorAll('.row-checkbox').forEach(cb => {
			cb.checked = checked;
		});

		const filtered = getFiltered();

		// Update Grist
		const actions = filtered.map(rec => [
			"UpdateRecord",
			"Users",
			rec.id,
			{
				SelectReminder: checked
			}
		]);

		await grist.docApi.applyUserActions(actions);
	});
	
	document.getElementById("yearInput").addEventListener("input", (e) => {

		alert("Couou");

		const year = e.target.value.trim();

		if (Number.isInteger(year) && year.toString().length === 4) {
			selectedYear = String(year);
			applyFilters();
		}
	});

	// Send reminder
	document
		.getElementById('sendReminderBtn')
		.addEventListener('click', async () => {

			// Premier record avec SelectReminder = true
			const firstSelected = allRecords.find(
				rec => rec.SelectReminder === true
			);

			if (!firstSelected) {
				await Swal.fire({
					icon: "info",
					title: "No professors selected",
					text: "Please select at least one professor.",
					confirmButtonText: "OK"
				});
				return;
			}

			const result = await Swal.fire({
				icon: "question",
				title: "Send reminders?",
				text: "Are you sure you want to send reminders to selected professors?",
				showCancelButton: true,
				confirmButtonText: "Yes, send reminders",
				cancelButtonText: "Cancel",
				confirmButtonColor: "#3085d6"
			});

			if (!result.isConfirmed) return;

			try {
				await window.grist.selectedTable.update({
					id: firstSelected.id,
					fields: {
						SelectedYear: selectedYear,
						ValidateBtn: true
					}
				});
				await Swal.fire({
					icon: "success",
					title: "Send reminders",
					text: "Reminder emails are being sent.",
					timer: 1500,
					showConfirmButton: false
				});
			} catch (err) {
				console.error(err);
				await Swal.fire({
					icon: "error",
					title: "Error",
					text: "Error triggering workflow."
				});
			}
		});
</script>

<script>
	svgPath = 'https://web2018.epfl.ch/8.3.0/icons/icons.svg';
	featherSvgPath = 'https://web2018.epfl.ch/8.3.0/icons/feather-sprite.svg';
</script>

</body>
</html>
