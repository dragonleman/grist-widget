<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<title>Activities Declaration</title>
  	<link rel="stylesheet" href="https://web2018.epfl.ch/8.3.0/css/elements.min.css">
	<link rel="stylesheet" href="css/declprofs.css">
	<script src="https://web2018.epfl.ch/8.3.0/js/elements.min.js"></script>
</head>
<body>
  	<header class="header header-light my-2">
		<div class="header-light-content">
			<a class="logo" href="https://www.epfl.ch"><img src="img/epfl_small.png" alt="Logo EPFL" class="img-fluid"></a>
			<p class="site-title"><a href="#">Professor outside activities</a></p>
			<nav class="nav-lang nav-lang-short ml-auto pr-lg-5"></nav>
		</div>
  	</header>

	<div class="breadcrumb-container pb-0 mb-0">
		<nav aria-label="breadcrumb" class="breadcrumb-wrapper" id="breadcrumb-wrapper"></nav>
	</div>

  	<div class="main-container m-4">

		<div class="d-flex justify-content-between align-items-center mb-3">

			<div class="d-flex align-items-center">

				<!-- Search -->
				<div id="searchDiv" style="position: relative; max-width: 300px; margin-right: 15px;">
					<input type="text" id="searchInput" placeholder="Search someone..."
						style="width: 93.5%; padding-left: 30px; box-sizing: border-box;">

					<svg class="icon" aria-hidden="true"
						style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
						width: 16px; height: 16px; pointer-events: none;">
						<use xlink:href="#user"></use>
					</svg>
				</div>

				<!-- Status filter -->
				<select id="statusFilter" class="form-control">
					<option value="All">All</option>
					<option value="❌">❌</option>
					<option value="✅">✅</option>
				</select>

				<select id="yearFilter" style="margin-bottom: 10px;">
				</select>
			</div>

			<!-- Send reminder button -->
			<button id="sendReminderBtn" class="btn btn-primary">
				Send reminder
			</button>
		</div>

		<div>
			<table id="table_alt" class="table table-boxed">
				<thead>
					<tr>
						<th><input type="checkbox" id="selectAll"></th>
						<th>Name</th>
						<th>Username</th>
						<th>Email</th>
						<th>Sciper</th>
						<th>Unit</th>
						<th>Status</th>
						<th>Sent reminder at</th>
						<th>Updated at</th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
	</div>

	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<script>
		window.grist.ready({ requiredAccess: 'full' });

		let allRecords = [];

		let selectedYear = new Date().getFullYear().toString();

		const yearFilter = document.getElementById("yearFilter");

		function parseStatusByYear(str) {
			try {
				return JSON.parse(str || "{}");
			} catch (e) {
				console.error("Invalid StatusByYear JSON:", str);
				return {};
			}
		}

		function renderTable(records) {

			const tbody = document.querySelector('#table_alt tbody');
			tbody.innerHTML = '';

			if (!records || records.length === 0) {

				const row = tbody.insertRow();
				const cell = row.insertCell();

				cell.colSpan = 8;
				cell.textContent = 'No data found.';
				cell.style.textAlign = 'center';

				return;
			}

			for (const rec of records) {

				// Parse le JSON stocké dans Grist
				const statusMap = parseStatusByYear(rec.StatusByYear);

				// Si une année est sélectionnée,
				// ignorer les records sans cette année
				if (selectedYear && !(selectedYear in statusMap)) {
					continue;
				}

				// Status affiché
				let status;

				if (selectedYear) {
					status = statusMap[selectedYear] ? "✅" : "❌";
				} else {
					status = "";
				}

				const row = tbody.insertRow();

				// SelectReminder
				const checkboxCell = row.insertCell();
				const checkboxInput = document.createElement('input');
				checkboxInput.type = 'checkbox';
				checkboxInput.classList.add('row-checkbox');
				checkboxInput.checked = !!rec.SelectReminder;
				checkboxInput.addEventListener('change', async () => {
					if (checkboxInput.checked !== rec.SelectReminder) {
						await window.grist.selectedTable.update({
							id: rec.id,
							fields: { SelectReminder: checkboxInput.checked }
						});
					}
				});
				checkboxCell.appendChild(checkboxInput);

				// Name
				row.insertCell().textContent = rec.Name || '';

				// Username
				row.insertCell().textContent = rec.Username || '';

				// Email
				row.insertCell().textContent = rec.Email || '';

				// Sciper
				row.insertCell().textContent = rec.UserId || '';

				// Unit
				row.insertCell().textContent = rec.Unit || '';

				// Status
				row.insertCell().textContent = status; //rec.status || '';

				// Sent Reminder At
				row.insertCell().textContent = rec.SentReminderAt ? new Date(rec.SentReminderAt).toLocaleString('fr-CH', { hour12: false }) : '';

				// Updated At
				row.insertCell().textContent = rec.UpdatedAt ? new Date(rec.UpdatedAt).toLocaleString('fr-CH', { hour12: false }) : '';
			}
		}

		function applyFilters() {

			const searchValue =
				document.getElementById('searchInput').value.toLowerCase();

			const statusValue =
				document.getElementById('statusFilter').value;

			const filtered = allRecords.filter(rec => {

				const matchesSearch =
					(rec.Name || '').toLowerCase().includes(searchValue) ||
					(rec.Username || '').toLowerCase().includes(searchValue) ||
					(rec.Email || '').toLowerCase().includes(searchValue);

				const matchesStatus =
					statusValue === 'All' ||
					(rec.status || '') === statusValue;

				return matchesSearch && matchesStatus;
			});

			renderTable(filtered);
		}

		window.grist.onRecords((records) => {
			allRecords = records || [];

			const years = new Set();

			for (const rec of allRecords) {
				const statusMap = parseStatusByYear(rec.StatusByYear);

				Object.keys(statusMap || {}).forEach(year => {
				years.add(year);
				});
			}

			// 🔥 IMPORTANT : fallback année courante si vide
			const currentYear = new Date().getFullYear().toString();
			years.add(currentYear);

			const sortedYears = [...years].sort();

			// si année courante pas dans la liste → on la force par défaut
			if (!sortedYears.includes(selectedYear)) {
				selectedYear = currentYear;
			}

			yearFilter.innerHTML = sortedYears
				.map(year => {
				return `<option value="${year}" ${
					year === selectedYear ? "selected" : ""
				}>${year}</option>`;
				})
				.join("");

			yearFilter.value = selectedYear;

			applyFilters();
		});

		// Search filter
		document
			.getElementById('searchInput')
			.addEventListener('input', applyFilters);

		// Status filter
		document
			.getElementById('statusFilter')
			.addEventListener('change', applyFilters);

		// Select all
		document
			.getElementById('selectAll')
			.addEventListener('change', function () {
				document
					.querySelectorAll('.row-checkbox')
					.forEach(cb => cb.checked = this.checked);
			});
		
		yearFilter.addEventListener("change", (e) => {
			selectedYear = e.target.value;
			applyFilters();
		});

		// Send reminder
		document
			.getElementById('sendReminderBtn')
			.addEventListener('click', async () => {

				// Premier record avec SelectReminder = true
				const firstSelected = allRecords.find(
					rec => rec.SelectReminder === true
				);

				if (!firstSelected) {
					await Swal.fire({
						icon: "info",
						title: "No professors selected",
						text: "Please select at least one professor.",
						confirmButtonText: "OK"
					});
					return;
				}

				const result = await Swal.fire({
					icon: "question",
					title: "Send reminders?",
					text: "Are you sure you want to send reminders to selected professors?",
					showCancelButton: true,
					confirmButtonText: "Yes, send reminders",
					cancelButtonText: "Cancel",
					confirmButtonColor: "#3085d6"
				});

				if (!result.isConfirmed) return;

				try {
					await window.grist.selectedTable.update({
						id: firstSelected.id,
						fields: {
							ValidateBtn: true
						}
					});
					await Swal.fire({
						icon: "success",
						title: "Send reminders",
						text: "Reminder emails are being sent.",
						timer: 1500,
						showConfirmButton: false
					});
				} catch (err) {
					console.error(err);
					await Swal.fire({
						icon: "error",
						title: "Error",
						text: "Error triggering workflow."
					});
				}
			});
	</script>

	<script>
    	svgPath = 'https://web2018.epfl.ch/8.3.0/icons/icons.svg';
    	featherSvgPath = 'https://web2018.epfl.ch/8.3.0/icons/feather-sprite.svg';
  	</script>
</body>
</html>
