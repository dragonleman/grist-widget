    <div class="main-container py-4" style="max-width: 1000px; margin: auto;">

    <div class="mb-5">
        <h2 class="mb-1">Admin Panel</h2>
        <p class="text-muted">
            Manage declaration exceptions and reminder emails.
        </p>
    </div>

    <!-- Exceptions -->
    <div class="card mb-4">
        <div class="card-body">

            <h4 class="card-title mb-2">
                Exceptions
            </h4>

            <p class="text-muted mb-4">
                Configure the period during which declaration exceptions apply.
            </p>

            <div class="row">

                <div class="col-md-4">
                    <div class="form-group">
                        <label for="startDateInput">
                            Start date
                        </label>
                        <input
                            id="startDateInput"
                            type="date"
                            class="form-control"
                        >
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label for="endDateInput">
                            End date
                        </label>
                        <input
                            id="endDateInput"
                            type="date"
                            class="form-control"
                        >
                    </div>
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <div class="custom-control custom-switch mb-2">
                        <input
                            id="exceptionSwitch"
                            type="checkbox"
                            class="custom-control-input"
                        >
                        <label
                            class="custom-control-label"
                            for="exceptionSwitch"
                        >
                            Enable exception
                        </label>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Emails -->
    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

                <div>
                    <h4 class="card-title mb-1">
                        Reminder emails
                    </h4>

                    <p class="text-muted mb-0">
                        Send reminder emails to professors who have not yet
                        completed their declaration.
                    </p>
                </div>

                <button
                    id="sendmailButton"
                    class="btn btn-primary"
                >
                    Send emails
                </button>

            </div>

        </div>
    </div>

</div>




	<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
	<script>
		const startDateInput = document.getElementById('startDateInput');
        const endDateInput = document.getElementById('endDateInput');
        const excBtn = document.getElementById('exceptionSwitch');
        const sendmailBtn = document.getElementById('sendmailButton');

		window.grist.ready({ requiredAccess: 'full' });

		window.grist.onRecords(records => {
            const rec = records[0];

            // Start date
            startDateInput.value = rec.Start_date || '';

            startDateInput.addEventListener('blur', async () => {
                if (startDateInput.value !== rec.Start_date) {
                    await window.grist.selectedTable.update({
                        id: rec.id,
                        fields: { Start_date: startDateInput.value }
                    });
                }
            });

            // End date
            endDateInput.value = rec.End_date || '';

            endDateInput.addEventListener('blur', async () => {
                if (endDateInput.value !== rec.End_date) {
                    await window.grist.selectedTable.update({
                        id: rec.id,
                        fields: { End_date: endDateInput.value }
                    });
                }
            });

            // Exception (Switch)
            excBtn.checked = Boolean(rec.exception);

            excBtn.addEventListener('change', async () => {
                await window.grist.selectedTable.update({
                    id: rec.id,
                    fields: { exception: excBtn.checked }
                });
            });

            // Send Emails
            sendmailBtn.addEventListener('click', async () => {
                await window.grist.selectedTable.update({
                    id: rec.id,
                    fields: { sendEmails: true }
                });
            });
        });
	</script>
